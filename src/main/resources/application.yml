spring:
  application:
    name: Aiatelye

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  hikari:
    minimum-idle: 3
    maximum-pool-size: 6
    idle-timeout: 30000
    max-lifetime: 2000000
    connection-timeout: 60000

  jpa:
    show-sql: true
    open-in-view: true
    hibernate:
      ddl-auto: update

server:
  port: 1111

logging:
  level:
    root: info
servlet:
  multipart:
    enabled: true
    max-file-size: 10MB        # Maksimum fayl ölçüsü
    max-request-size: 10MB
minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ADMIN}
  secret-key: ${SECRET_ADMIN}
  bucket: ai-atelye-storage
  image:
    allowed-extensions: jpg,jpeg,png,webp
    max-size-mb: 5